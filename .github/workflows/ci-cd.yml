name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Backend CI: Build & Test Spring Boot ──────────────────────────────────
  backend-ci:
    name: Backend CI (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        run: |
          mvn clean package

  # ─── Frontend CI: Build & Lint React Application ────────────────────────────
  frontend-ci:
    name: Frontend CI (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

  # ─── CD: Trigger Automated Deployments ──────────────────────────────────────
  deploy:
    name: Continuous Deployment (CD)
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Trigger Render Backend Deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        # Execute only if the deploy hook secret is configured in the repository settings
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          echo "Triggering automated deploy to Render..."
          curl -f "${{ env.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deploy Frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # Execute only if the Vercel credentials secrets are configured
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          echo "Deploying production build to Vercel..."
          npm install --global vercel
          vercel deploy --prod --token "${{ env.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}" --yes
