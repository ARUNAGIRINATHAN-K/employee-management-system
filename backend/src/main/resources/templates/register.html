<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex align-items-center justify-content-center bg-body-tertiary min-vh-100">
    <div class="card shadow-sm p-4 w-100 mx-auto" style="max-width: 450px;" style="max-width:500px">
        <div class="text-center mb-4">
            <h1 class="text-primary fs-3 fw-bold"><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1>
            <p class="text-muted small">Create your account</p>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)" class="needs-validation" novalidate>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="mb-3">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" class="form-control" placeholder="John" required>
                <div class="invalid-feedback">This field is required.</div></div>
                <div class="mb-3">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                <div class="invalid-feedback">This field is required.</div></div>
            </div>
            <div class="mb-3">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="johndoe" required minlength="3" required>
            <div class="invalid-feedback">This field is required.</div></div>
            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            <div class="invalid-feedback">This field is required.</div></div>
            <div class="mb-3">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" class="form-control" placeholder="Min 8 characters" required minlength="8" required>
            <div class="invalid-feedback">This field is required.</div></div>
            <button type="submit" class="btn btn-primary w-100">Create Account</button>
            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-secondary)">
                Already have an account? <a href="/login" style="font-weight:600">Sign In</a>
            </p>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
function handleRegister(e) {
    e.preventDefault();
    WorkForceHub.register({
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('regPassword').value
    });
}
</script>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        /*<![CDATA[*/
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;
        if (successMsg) setTimeout(() => WorkForceHub.showToast(successMsg, 'success'), 500);
        if (errorMsg) setTimeout(() => WorkForceHub.showToast(errorMsg, 'error'), 500);
        /*]]>*/
    });
</script>
</body>

</html>
