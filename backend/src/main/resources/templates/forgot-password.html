<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex align-items-center justify-content-center bg-body-tertiary min-vh-100">
    <div class="card shadow-sm p-4 w-100 mx-auto" style="max-width: 450px;">
        <div class="text-center mb-4"><h1 class="text-primary fs-3 fw-bold"><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1><p>Reset your password</p></div>
        <form id="forgotForm" onsubmit="handleForgot(event)">
            <div class="mb-3"><label for="fpEmail">Email Address</label><input type="email" id="fpEmail" class="form-control" placeholder="Enter your registered email" required></div>
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-secondary)">
                Remember your password? <a href="/login" style="font-weight:600">Sign In</a>
            </p>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
function handleForgot(e) {
    e.preventDefault();
    WorkForceHub.apiCall('/auth/forgot-password', 'POST', { email: document.getElementById('fpEmail').value })
        .then(r => { WorkForceHub.showToast(r?.success ? 'Reset link sent to your email' : (r?.message || 'Failed'), r?.success ? 'success' : 'error'); });
}
</script>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        /*<![CDATA[*/
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;
        if (successMsg) setTimeout(() => WorkForceHub.showToast(successMsg, 'success'), 500);
        if (errorMsg) setTimeout(() => WorkForceHub.showToast(errorMsg, 'error'), 500);
        /*]]>*/
    });
</script>
</body>

</html>
