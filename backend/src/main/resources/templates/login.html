<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WorkForceHub - Enterprise Employee Management System Login">
    <title>Login | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex align-items-center justify-content-center bg-body-tertiary min-vh-100">
    <div class="card shadow-sm p-4 w-100 mx-auto" style="max-width: 450px;">
        <div class="text-center mb-4">
            <h1 class="text-primary fs-3 fw-bold"><i class="bi bi-grid-3x3-gap-fill"></i> WorkForceHub</h1>
            <p class="text-muted small">Enterprise Employee Management System</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="usernameOrEmail">Username or Email</label>
                <input type="text" id="usernameOrEmail" class="form-control" placeholder="Enter your username or email" required>
            <div class="invalid-feedback">This field is required.</div></div>
            <div class="mb-3">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                        <i class="bi bi-eye" id="togglePwdIcon"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <label class="form-check-label">
                    <input type="checkbox" class="form-check-input me-2"> Remember me
                </label>
                <a href="/forgot-password" style="font-size:0.875rem;font-weight:500">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                <span id="loginBtnText">Sign In</span>
                <span id="loginSpinner" style="display:none"><i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite"></i></span>
            </button>

            <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-secondary)">
                Don't have an account? <a href="/register" style="font-weight:600">Sign Up</a>
            </p>
        </form>

        <div class="mt-4 p-3 bg-body rounded text-center small border">
            <strong style="color:var(--text-primary)">Demo Credentials:</strong><br>
            <span style="color:var(--text-secondary)">Username: <code>admin</code> | Password: <code>Admin@123</code></span>
        </div>
    </div>
</div>

<style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
    function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const text = document.getElementById('loginBtnText');
        const spinner = document.getElementById('loginSpinner');
        text.style.display = 'none';
        spinner.style.display = 'inline';
        btn.disabled = true;
        WorkForceHub.login(
            document.getElementById('usernameOrEmail').value,
            document.getElementById('password').value
        ).finally(() => {
            text.style.display = 'inline';
            spinner.style.display = 'none';
            btn.disabled = false;
        });
    }
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('togglePwdIcon');
        if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
        else { input.type = 'password'; icon.className = 'bi bi-eye'; }
    }
</script>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        /*<![CDATA[*/
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;
        if (successMsg) setTimeout(() => WorkForceHub.showToast(successMsg, 'success'), 500);
        if (errorMsg) setTimeout(() => WorkForceHub.showToast(errorMsg, 'error'), 500);
        /*]]>*/
    });
</script>
</body>

</html>
