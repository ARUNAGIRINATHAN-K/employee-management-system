<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payslips | WorkForceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex min-vh-100 bg-body-tertiary">
    <!-- Sidebar -->
    <aside class="d-flex flex-column flex-shrink-0 p-3 bg-body border-end shadow-sm" style="width: 280px;" id="sidebar">
        <div class="d-flex align-items-center pb-3 mb-3 border-bottom px-2">
            <div class="bg-primary text-white rounded d-flex align-items-center justify-content-center" style="width:32px;height:32px;font-weight:bold;">W</div>
            <span class="fs-5 fw-bold text-body ms-2">WorkForceHub</span>
        </div>
        <nav class="nav nav-pills flex-column mb-auto mt-3">
            <div class="nav-section">
                <div class="text-muted small fw-bold text-uppercase px-3 mb-2 mt-4">Main</div>
                <a href="/dashboard" class="nav-link link-body-emphasis mb-1"><i class="bi bi-grid-1x2-fill"></i> My Dashboard</a>
            </div>
            <div class="nav-section">
                <div class="text-muted small fw-bold text-uppercase px-3 mb-2 mt-4">My Actions</div>
                <a href="/attendance/my-records" class="nav-link link-body-emphasis mb-1"><i class="bi bi-clock-history"></i> My Attendance</a>
                <a href="/leaves" class="nav-link link-body-emphasis mb-1"><i class="bi bi-calendar-event"></i> My Leaves</a>
                <a href="/payslips" class="nav-link active mb-1"><i class="bi bi-cash-stack"></i> My Payslips</a>
            </div>
        </nav>
        <div style="padding:1rem;border-top:1px solid var(--border-color)">
            <a href="#" onclick="WorkForceHub.logout()" class="nav-link link-body-emphasis mb-1" style="color:var(--danger)">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex flex-column overflow-hidden">
        <header class="navbar bg-body border-bottom px-4 py-2 shadow-sm d-flex justify-content-between">
            <h5 class="m-0 fw-bold">My Payslips</h5>
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 border" type="button" data-bs-toggle="dropdown">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:32px;height:32px;font-size:14px" th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</div>
                        <span class="d-none d-md-block fw-medium" th:text="${#authentication.name}">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><a class="dropdown-item text-danger" href="#" onclick="WorkForceHub.logout()"><i class="bi bi-box-arrow-left me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <div class="flex-grow-1 overflow-auto p-4 p-md-5">
            <div class="card card-custom border-0 shadow-sm animate-slide-up">
                <div class="card-header bg-white border-0 pt-4 px-4 pb-0">
                    <h5 class="fw-bold m-0">Payroll History</h5>
                </div>
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Pay Period</th>
                                    <th>Basic Salary</th>
                                    <th>Allowances</th>
                                    <th>Deductions</th>
                                    <th>Net Salary</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${payslips}">
                                    <td class="fw-medium" th:text="${p.payPeriodStart + ' to ' + p.payPeriodEnd}"></td>
                                    <td th:text="${'$' + p.basicSalary}"></td>
                                    <td th:text="${'$' + p.allowances}"></td>
                                    <td th:text="${'$' + p.deductions}"></td>
                                    <td class="fw-bold text-success" th:text="${'$' + p.netSalary}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${p.paid ? 'bg-success' : 'bg-warning text-dark'}" th:text="${p.paid ? 'PAID' : 'PENDING'}"></span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary" th:if="${p.paid}" onclick="alert('PDF Generation coming soon!')">
                                            <i class="bi bi-download"></i> PDF
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(payslips)}">
                                    <td colspan="7" class="text-center text-muted py-3">No payslips found.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
