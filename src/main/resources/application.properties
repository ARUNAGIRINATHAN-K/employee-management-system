spring.application.name=employee-management

# Embedded database for local development
spring.datasource.url=jdbc:h2:mem:ems_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart File Upload Properties (for employee photos)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom property for uploads directory
app.upload.dir=uploads

# JWT settings (override via environment variable JWT_SECRET)
jwt.secret=Y2hvb25hLW15LXNlY3JldC1rZXktZm9yLWVtcGxveWVlLW1hbmFnZW1lbnQtc3lzdGVtLTMxMjM0NTY3ODkw
jwt.expiration-ms=86400000
