# Application configuration
spring.application.name=employee-management-system
server.port=${PORT:8080}

# ============================================================
# Database Configuration (MySQL)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ems_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA & Hibernate Configuration
# ============================================================
# 'update' validates the schema against entities and applies
# additive changes. Use 'validate' in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable Spring Boot's automatic schema.sql execution
# (schema.sql is provided for manual / CI use only;
#  Hibernate ddl-auto=update handles table creation at runtime)
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.security=INFO
logging.level.com.ems.employee_management_system=DEBUG

# ============================================================
# JWT Configuration Properties
# ============================================================
# Secret key: base64-encoded, at least 256 bits (32 bytes)
jwt.secret=${JWT_SECRET:9a67471b79e8c459f0f9b6fb3e78e24c7f078a6ff68a2d12e616c68a412803b9b4f2cde9ebc6c09a80b06b0d3886f32e9a59b661d40292ff2435e5d1ee55df62}
# Token validity: 1 day in milliseconds (24 * 60 * 60 * 1000)
jwt.expiration=${JWT_EXPIRATION:86400000}
