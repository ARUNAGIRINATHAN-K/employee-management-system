<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Employee Management System - Secure login portal for managing your workforce">
    <title>EMS - Employee Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>EMS Portal</h1>
                <p>Employee Management System</p>
            </div>

            <!-- Form Toggle -->
            <div class="form-toggle" id="formToggle">
                <button class="active" data-form="login">Sign In</button>
                <button data-form="forgot">Forgot Password</button>
                <button data-form="reset">Reset Password</button>
            </div>

            <!-- Error / Success Messages -->
            <div class="error-message" id="authError"></div>
            <div class="success-message" id="authSuccess"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
                <div class="login-footer">
                    <p style="color: hsl(228,12%,45%); font-size: 0.82rem; margin-top: 20px;">
                        Demo Credentials:<br>
                        <span style="color: hsl(258,72%,68%);">HR:</span> admin / admin123 &nbsp;|&nbsp;
                        <span style="color: hsl(190,90%,55%);">Manager:</span> manager / manager123<br>
                        <span style="color: hsl(152,69%,55%);">Employee:</span> employee / employee123
                    </p>
                </div>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgotForm" style="display:none;">
                <div class="form-group">
                    <label for="forgotEmail">Username / Email</label>
                    <input type="text" id="forgotEmail" placeholder="Enter your username" required>
                </div>
                <button type="submit" class="btn-primary">Generate Reset Code</button>
            </form>

            <!-- Reset Password Form -->
            <form id="resetForm" style="display:none;">
                <div class="form-group">
                    <label for="resetEmail">Username / Email</label>
                    <input type="text" id="resetEmail" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="resetToken">Reset Code</label>
                    <input type="text" id="resetToken" placeholder="Enter 6-character code" required>
                </div>
                <div class="form-group">
                    <label for="resetNewPassword">New Password</label>
                    <input type="password" id="resetNewPassword" placeholder="Enter new password" required>
                </div>
                <button type="submit" class="btn-primary">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
